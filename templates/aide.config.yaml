# AIDE workflow configuration
# Copy this file to .aide/config.yaml in your business project and customize.
# If .aide/config.yaml is missing, AIDE uses the defaults shown below.

version: "1"

# Optional: hint for language-aware skill prompts (python, go, rust, etc.)
language: ""

# When true, all gates require explicit confirmation — no skipping allowed.
strict_mode: false

stages:
  spec:
    enabled: true
    gates:
      - name: after_spec
        type: confirm
        prompt: "Review the spec at .aide/output/1-spec/spec.md. Does this look right? (y/n)"

