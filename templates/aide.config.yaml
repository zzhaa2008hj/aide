# AIDE workflow configuration
# Copy this file to .aide/config.yaml in your business project and customize.
# If .aide/config.yaml is missing, AIDE uses the defaults shown below.

version: "1"

# Optional: hint for language-aware skill prompts (python, go, rust, etc.)
language: ""

# When true, all gates require explicit confirmation — no skipping allowed.
strict_mode: false

stages:
  spec:
    enabled: true
    gates:
      - name: after_spec
        type: confirm
        prompt: "Review the spec at .aide/output/1-spec/spec.md. Does this look right? (y/n)"
    review_panel:
      enabled: true
      reviewers:
        - id: edge_case
          enabled: true
          max_gaps: 8
        - id: security
          enabled: true
          max_gaps: 5
        - id: performance
          enabled: true
          max_gaps: 5
      min_reviewers: 2

  plan:
    enabled: true
    gates:
      - name: after_plan
        type: confirm_skip
        prompt: "Review the plan at .aide/output/2-plan/plan.md. Does this look right? (y/n/skip)"

  implement:
    enabled: true
    gates:
      - name: after_implement
        type: auto
        prompt: "Code changes complete. Review the summary above."

  test:
    enabled: true
    gates:
      - name: after_test
        type: auto
        prompt: "Test verification complete."

# Fix pipeline (rapid bug-fix / small optimization)
fix:
  enabled: true
  gates:
    - name: after_analyze
      type: confirm_skip
      prompt: "Review the analyze result above. Does the diagnosis look correct? (y/n/skip)"
    - name: after_fix
      type: confirm
      prompt: "Review the changes and test results above. Accept the fix? (y/n)"
